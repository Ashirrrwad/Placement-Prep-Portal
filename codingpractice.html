<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeQuest | Arankerzz</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f7fa;
      color: #333;
    }

    .navbar {
      background: #1e3a8a;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
    }

    .sidebar {
      flex: 1;
      min-width: 250px;
      background: #edf2f4;
      padding: 20px;
      border-right: 2px solid #ccc;
    }

    .sidebar h3 {
      margin-bottom: 10px;
      color: #2b2d42;
    }

    .sidebar select, .sidebar button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    .main {
      flex: 3;
      padding: 20px;
    }

    .question-card {
      background: white;
      margin-bottom: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .question-card:hover {
      transform: translateY(-5px);
    }

    .question-card h4 {
      margin-bottom: 10px;
    }

    .difficulty {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      margin-left: 10px;
    }

    .easy { background: #90ee90; }
    .medium { background: #ffd700; }
    .hard { background: #ff6b6b; }

    @media(max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar { border-right: none; border-bottom: 2px solid #ccc; }
    }
  </style>
</head>
<body>

<div class="navbar">
  CodeQuest ⚡ Practice Arena
</div>

<div class="container">

  <div class="sidebar">
    <h3>Choose Language</h3>
    <select id="language">
      <option>Python</option>
      <option>Java</option>
      <option>C++</option>
      <option>JavaScript</option>
    </select>

    <h3>Choose Difficulty</h3>
    <select id="difficulty">
      <option>All</option>
      <option>Beginner</option>
      <option>Intermediate</option>
      <option>Advanced</option>
    </select>

    <button onclick="filterQuestions()">Apply Filters</button>
  </div>

  <div class="main" id="questionsArea">
    <!-- Questions will be dynamically inserted here -->
  </div>

</div>

<script>
  const questions = [
    { title: "Print Fibonacci Series", difficulty: "Beginner", language: ["Python", "Java", "C++", "JavaScript"] },
    { title: "Find Prime Numbers", difficulty: "Beginner", language: ["Python", "C++"] },
    { title: "Longest Substring Without Repeating", difficulty: "Intermediate", language: ["Python", "Java"] },
    { title: "Implement LRU Cache", difficulty: "Advanced", language: ["C++", "Java"] },
    { title: "Binary Tree Traversals", difficulty: "Intermediate", language: ["Python", "C++"] },
    { title: "Dynamic Programming - Knapsack", difficulty: "Advanced", language: ["Python", "Java", "C++"] }
  ];

  function renderQuestions(data) {
    const container = document.getElementById('questionsArea');
    container.innerHTML = '';

    data.forEach(q => {
      const div = document.createElement('div');
      div.className = 'question-card';
      div.innerHTML = `
        <h4>${q.title} <span class="difficulty ${q.difficulty.toLowerCase()}">${q.difficulty}</span></h4>
        <p>Supported Languages: ${q.language.join(', ')}</p>
      `;
      container.appendChild(div);
    });
  }

  function filterQuestions() {
    const lang = document.getElementById('language').value;
    const diff = document.getElementById('difficulty').value;

    const filtered = questions.filter(q => 
      (diff === "All" || q.difficulty === diff) && q.language.includes(lang)
    );
    renderQuestions(filtered);
  }

  window.onload = () => renderQuestions(questions);
</script>

</body>
</html>
